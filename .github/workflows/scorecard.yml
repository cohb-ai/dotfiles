name: Scorecard

# OpenSSF Scorecard — scores supply-chain posture (branch protection, pinned
# deps, token permissions, …) and uploads SARIF to the repo's Security tab.
# Zero-maintenance signal; results also feed the public Scorecard badge/API.

on:
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1'   # weekly, Monday 06:00 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to the Security tab
      id-token: write          # publish results to the OpenSSF API
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
