name: Scorecard

# OpenSSF Scorecard — scores supply-chain posture (branch protection, pinned
# deps, token permissions, …) and uploads SARIF to the repo's Security tab.
# Zero-maintenance signal; results also feed the public Scorecard badge/API.

on:
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1'   # weekly, Monday 06:00 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    # Scorecard scores PUBLIC supply-chain posture and publishes to a public API,
    # so it errors ("Resource not accessible") while this repo is private. Skip
    # until then; the condition auto-activates it the moment the repo goes public.
    if: ${{ github.event.repository.private == false }}
    permissions:
      # Job-level permissions REPLACE the workflow-level set (they don't merge),
      # so every scope this job needs must be listed here or it defaults to none.
      contents: read           # checkout needs this — without it, "Repository not found"
      actions: read            # Scorecard's CI-tests / branch-protection checks
      security-events: write   # upload SARIF to the Security tab
      id-token: write          # publish results to the OpenSSF API
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
