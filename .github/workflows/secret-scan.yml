name: Secret scan

# Detect committed credentials by *shape* (entropy/regex) across full history.
# Complements pii-scan, which catches known personal values by literal denylist.
# Run as the gitleaks MIT CLI via its container so there's no GITLEAKS_LICENSE
# gate (that only applies to the gitleaks-action on GitHub Organizations).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `detect` scans every commit

      - name: Run gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.21.2 \
            detect --source=/repo --redact --verbose
