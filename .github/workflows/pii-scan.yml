name: PII scan

# Backstop for the local pre-commit hook: runs the same literal cashfwd denylist
# scan in CI, where the private scrub-rules.json doesn't exist. The denylist is
# supplied as the PII_SCRUB_RULES repository secret (paste scrub-rules.json's
# contents). Without the secret the job fails closed (--require-rules), so a
# missing/dropped secret is loud, not silent.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pii-scan:
    name: Scan tracked files for PII
    runs-on: ubuntu-latest
    # The denylist comes from a secret, but GitHub withholds secrets from
    # Dependabot and fork pull_request events — there the secret is empty and
    # the fail-closed scan would error spuriously. Run on pushes and same-repo
    # PRs (which can read the secret); skip Dependabot/fork PRs, which are
    # covered by the push-to-main run after merge.
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize denylist from secret
        env:
          PII_SCRUB_RULES: ${{ secrets.PII_SCRUB_RULES }}
        run: |
          set -euo pipefail
          if [ -z "${PII_SCRUB_RULES:-}" ]; then
            echo "::error::PII_SCRUB_RULES secret is not set — add it (contents of scrub-rules.json)."
            exit 1
          fi
          printf '%s' "$PII_SCRUB_RULES" > "$RUNNER_TEMP/scrub-rules.json"

      - name: Run pii-scan
        env:
          PII_RULES: ${{ runner.temp }}/scrub-rules.json
        run: |
          set -euo pipefail
          ./bin/pii-scan --require-rules

      - name: Cleanup
        if: always()
        run: rm -f "$RUNNER_TEMP/scrub-rules.json"
