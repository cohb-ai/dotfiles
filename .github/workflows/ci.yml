name: CI

# Single CI workflow so branch protection needs only ONE required check: the
# `CI` gate job at the bottom. It depends on every other job here and is the
# only status check you require per repo — uniform name across all repos, so
# there is nothing per-repo to remember. Add/remove jobs freely; just keep them
# in the gate's `needs:` list and keep the gate named `CI`.
#
# (Scorecard stays in its own scorecard.yml: it has no pull_request trigger and
# is public-gated, so it is never part of the gate.)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # shellcheck for the Bash/sh scripts. .zshrc is intentionally excluded —
  # shellcheck has no zsh dialect and would false-error on zsh syntax. bin/t is
  # Python, not shell, so it must be excluded too (shellcheck SC1071 errors on a
  # non-shell shebang). Rather than hardcode either skip, discover targets by
  # shebang: only files whose first line names bash or sh are linted, so a new
  # Python/zsh helper in bin/ is auto-excluded and a new shell script auto-covered.
  # shfmt is deliberately not run: it can't preserve the column-aligned `link`
  # calls in install.sh, so a format check would fight the intended style.
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest   # shellcheck is preinstalled on ubuntu runners
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          files=(install.sh)
          for f in bin/* .githooks/*; do
            head -1 "$f" | grep -qE '^#!.*\b(bash|sh)$' && files+=("$f")
          done
          printf 'linting: %s\n' "${files[*]}"
          shellcheck "${files[@]}"

  # Detect committed credentials by *shape* (entropy/regex) across full history.
  # Complements pii-scan, which catches known personal values by literal denylist.
  # Run as the gitleaks MIT CLI via its container so there's no GITLEAKS_LICENSE
  # gate (that only applies to the gitleaks-action on GitHub Organizations).
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `detect` scans every commit

      - name: Run gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.21.2 \
            detect --source=/repo --redact --verbose

  # Backstop for the local pre-commit hook: runs the same literal denylist
  # scan in CI, where the private scrub-rules.json doesn't exist. The denylist is
  # supplied as the PII_SCRUB_RULES repository secret (paste scrub-rules.json's
  # contents). Without the secret the job fails closed (--require-rules), so a
  # missing/dropped secret is loud, not silent.
  pii-scan:
    name: Scan tracked files for PII
    runs-on: ubuntu-latest
    # The denylist comes from a secret, but GitHub withholds secrets from
    # Dependabot and fork pull_request events — there the secret is empty and
    # the fail-closed scan would error spuriously. Run on pushes and same-repo
    # PRs (which can read the secret); skip Dependabot/fork PRs, which are
    # covered by the push-to-main run after merge. The CI gate treats this
    # skip as a pass.
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v4

      - name: Materialize denylist from secret
        env:
          PII_SCRUB_RULES: ${{ secrets.PII_SCRUB_RULES }}
        run: |
          set -euo pipefail
          if [ -z "${PII_SCRUB_RULES:-}" ]; then
            echo "::error::PII_SCRUB_RULES secret is not set — add it (contents of scrub-rules.json)."
            exit 1
          fi
          printf '%s' "$PII_SCRUB_RULES" > "$RUNNER_TEMP/scrub-rules.json"

      - name: Run pii-scan
        env:
          PII_RULES: ${{ runner.temp }}/scrub-rules.json
        run: |
          set -euo pipefail
          ./bin/pii-scan --require-rules

      - name: Cleanup
        if: always()
        run: rm -f "$RUNNER_TEMP/scrub-rules.json"

  # pytest suite for the pure logic in the Python bins (bin/t, bin/pr-watch).
  # Coverage is scoped (in pyproject.toml) to those two files and excludes the
  # subprocess/ssh/tmux/CLI glue, so --cov-fail-under guards the deterministic
  # helpers we actually test. The threshold is a RATCHET: raise it as coverage
  # grows, never lower it. (Set a few points below the measured value so a minor
  # refactor does not spuriously fail; bump it after a meaningful coverage gain.)
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test deps
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage gate
        run: pytest --cov --cov-report=term-missing --cov-fail-under=95

  # Audit the CI/dev dependencies (requirements-dev.txt) for known CVEs. This is
  # the only dependency manifest in the repo — install.sh stays dependency-free,
  # so there is nothing else to scan — but these deps still run in the Actions
  # runner, so a vulnerable pytest/pytest-cov is worth catching. `-r` resolves the
  # pins without installing them into the job env. Fails the job on any advisory.
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Audit CI/dev dependencies for known CVEs
        run: |
          pip install pip-audit
          pip-audit -r requirements-dev.txt

  # CodeQL static analysis (SAST) over the Python. Only `python` is requested:
  # CodeQL has no shell language, so the Bash scripts (install.sh, bin/csync,
  # sleep-manager, …) are out of scope here — shellcheck covers them. The two
  # interesting targets, bin/t and bin/pr-watch, are EXTENSIONLESS; CodeQL's
  # Python extractor finds them anyway via their `#!/usr/bin/env python3` shebang
  # (plus tests/*.py by extension). Do NOT add a paths/extension filter to "tidy"
  # this — a `.py`-only filter would silently drop the bins that shell out and
  # (pr-watch) auto-push, which are the whole reason this job exists. Python is
  # interpreted, so no autobuild step is needed: init → analyze.
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      # Job-level permissions REPLACE the workflow-level `contents: read`, so
      # every scope CodeQL needs must be listed here (see scorecard.yml).
      actions: read
      contents: read
      security-events: write   # upload SARIF results to the Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  # The single required status check. Turns green only when every job above
  # succeeds (or is legitimately skipped, e.g. pii-scan on fork/Dependabot PRs).
  # `if: always()` is load-bearing: without it the gate is itself skipped when a
  # dependency fails, so the required check would never report failure and the PR
  # would merge anyway. We inspect needs.*.result explicitly instead.
  ci:
    name: CI
    if: always()
    needs: [shellcheck, gitleaks, pii-scan, pytest, pip-audit, codeql]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          for r in ${{ join(needs.*.result, ' ') }}; do
            [ "$r" = success ] || [ "$r" = skipped ] || { echo "gate failed: job result was '$r'"; exit 1; }
          done
          echo "All required jobs passed."
